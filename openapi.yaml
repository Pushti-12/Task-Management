openapi: 3.0.3
info:
  title: Task Management API
  version: 1.0.0
  description: A RESTful task management backend using PostgreSQL for users and MongoDB for tasks.
servers:
  - url: http://localhost:3000
paths:
  /api/auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: test@example.com
                password:
                  type: string
                  minLength: 6
                  example: password123
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User registered successfully
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      email:
                        type: string
                        example: test@example.com
        '400':
          description: Validation or duplicate email error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "\"email\" must be a valid email"
  /api/auth/login:
    post:
      summary: Login a user and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: test@example.com
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid credentials
  /api/auth/profile:
    get:
      summary: Get the authenticated user's profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  email:
                    type: string
                    example: test@example.com
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid token
  /api/tasks:
    post:
      summary: Create a new task for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
                - dueDate
              properties:
                title:
                  type: string
                  example: Finish homework
                description:
                  type: string
                  example: Complete the task management API documentation
                dueDate:
                  type: string
                  format: date
                  example: 2026-04-20
                status:
                  type: string
                  enum: [pending, completed]
                  example: pending
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                    example: 605c5fa5e1a4ec3044f1c123
                  title:
                    type: string
                    example: Finish homework
                  description:
                    type: string
                    example: Complete the task management API documentation
                  dueDate:
                    type: string
                    format: date-time
                    example: 2026-04-20T00:00:00.000Z
                  status:
                    type: string
                    example: pending
                  userId:
                    type: integer
                    example: 1
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "\"title\" is required"
    get:
      summary: Get all tasks for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                    title:
                      type: string
                    description:
                      type: string
                    dueDate:
                      type: string
                      format: date-time
                    status:
                      type: string
                    userId:
                      type: integer
  /api/tasks/{id}:
    get:
      summary: Get a specific task by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: 605c5fa5e1a4ec3044f1c123
      responses:
        '200':
          description: Task returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                  title:
                    type: string
                  description:
                    type: string
                  dueDate:
                    type: string
                    format: date-time
                  status:
                    type: string
                  userId:
                    type: integer
        '404':
          description: Task not found or not owned by user
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Task not found
    put:
      summary: Update a specific task by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Finish homework
                description:
                  type: string
                  example: Finalize docs
                dueDate:
                  type: string
                  format: date
                  example: 2026-04-25
                status:
                  type: string
                  enum: [pending, completed]
                  example: completed
      responses:
        '200':
          description: Updated task returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                  title:
                    type: string
                  status:
                    type: string
        '400':
          description: Validation error
        '404':
          description: Task not found
    delete:
      summary: Delete a specific task by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Task deleted
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Task not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
